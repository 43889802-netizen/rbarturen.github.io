<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Azkabar - Finalizar Pedido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>💳 Finalizar Pedido</h1>
    </header>

    <div class="container">
        <form id="form-pago">
            <h3>Datos de Envío</h3>
            <div class="fila-envio">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="correo" placeholder="Correo electrónico" required>
                <input type="text" id="telefono" placeholder="Teléfono de contacto" required>
            </div>
            
            <h3>Método de Pago</h3>
            <select id="metodo" required onchange="verificarMetodo()">
                <option value="" disabled selected>Selecciona un método de pago</option>
                <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                <option value="yape">Yape / Plin</option>
                <option value="efectivo">Pago contra entrega</option>
            </select>

            <div id="contenedor-tarjeta">
                <h4>Datos de la Tarjeta</h4>
                <input type="text" class="input-tarjeta" placeholder="Número de Tarjeta (16 dígitos)" maxlength="16">
                <input type="text" class="input-tarjeta" placeholder="Nombre del Titular">
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="MM/AA" maxlength="5">
                    <input type="password" placeholder="CVV" maxlength="3">
                </div>
            </div>

            <div id="contenedor-yape">
                <p>Escanea el código para yapear:</p>
                <img src="imagenes/qr-yape.png" alt="QR Yape Azkabar">
                <span class="numero-yape">O yapea al: 944 870 211</span>
                <p><small>Titular: Azkabar Licores</small></p>
            </div>
            
            <h4 id="monto-total" style="font-size: 20px; color: #b30000; margin-top: 20px;">Total a pagar: S/ 0.00</h4>
            <button type="submit" class="btn-pagar">Confirmar y Pagar</button>
        </form>
    </div>

    <script>
        // Función para mostrar/ocultar secciones
        function verificarMetodo() {
            const metodo = document.getElementById("metodo").value;
            const cajaYape = document.getElementById("contenedor-yape");
            const cajaTarjeta = document.getElementById("contenedor-tarjeta");

            cajaYape.style.display = (metodo === "yape") ? "block" : "none";
            cajaTarjeta.style.display = (metodo === "tarjeta") ? "block" : "none";
            
            // Configurar campos requeridos para la tarjeta
            const inputs = cajaTarjeta.getElementsByTagName('input');
            for (let i = 0; i < inputs.length; i++) {
                inputs[i].required = (metodo === "tarjeta");
            }
        }

        // Lógica al enviar el formulario
        document.getElementById("form-pago").addEventListener("submit", function(e) {
            e.preventDefault();
            const metodo = document.getElementById("metodo").value;
            const nombre = document.getElementById("nombre").value;

            if (metodo === "yape") {
                alert("¡Perfecto " + nombre + "! Realizó su pago. Envíe una captura al número 944 870 211 que se muestra debajo del QR.");
            } else if (metodo === "tarjeta") {
                alert("¡Pago con tarjeta procesado con éxito!");
            } else {
                alert("Pedido registrado. Pago contra entrega solicitado.");
            }

            // Vaciar carrito y volver al inicio
            localStorage.removeItem("carrito");
            window.location.href = "index.html";
        });

        // Mostrar total al cargar
        window.onload = function() {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const total = carrito.reduce((acc, p) => acc + (parseFloat(p.precio) || 0), 0);
            document.getElementById("monto-total").textContent = "Total a pagar: S/ " + total.toFixed(2);
        };
    </script>
</body>
</html>
