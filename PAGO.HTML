<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Azkabar - Finalizar Pedido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>💳 Finalizar Pedido</h1>
    </header>

    <div class="container">
        <form id="form-pago">
            <h3>Datos de Envío</h3>
            <div class="fila-tarjeta"> <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <input type="text" placeholder="Teléfono de contacto" required>
            </div>
            
            <h3>Método de Pago</h3>
            <select id="metodo" required onchange="verificarMetodo()">
                <option value="" disabled selected>Selecciona un método de pago</option>
                <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                <option value="yape">Yape / Plin</option>
            </select>

            <div id="contenedor-tarjeta" style="display: none;">
                <h4>Datos de la Tarjeta</h4>
                <input type="text" class="input-tarjeta" placeholder="Número de Tarjeta" maxlength="16">
                <input type="text" class="input-tarjeta" placeholder="Titular">
                <div class="fila-tarjeta">
                    <input type="text" placeholder="MM/AA" maxlength="5">
                    <input type="password" placeholder="CVV" maxlength="3">
                </div>
            </div>

            <div id="contenedor-yape">
                <p>Escanea el código para yapear:</p>
                <img src="imagenes/qr-yape.png" alt="QR Yape">
                <span class="numero-yape">O yapea al: 944 870 211</span>
            </div>
            
            <h4 id="monto-total">Total a pagar: S/ 0.00</h4>
            <button type="submit" class="btn-pedido">Confirmar y Pagar</button>
        </form>
    </div>

    <script>
        function verificarMetodo() {
            const metodo = document.getElementById("metodo").value;
            const cajaYape = document.getElementById("contenedor-yape");
            const cajaTarjeta = document.getElementById("contenedor-tarjeta");

            cajaYape.style.display = (metodo === "yape") ? "block" : "none";
            cajaTarjeta.style.display = (metodo === "tarjeta") ? "block" : "none";
        }

        document.getElementById("form-pago").addEventListener("submit", function(e) {
            e.preventDefault();
            const metodo = document.getElementById("metodo").value;
            const nombre = document.getElementById("nombre").value;

            if (metodo === "yape") {
                alert("Perfecto " + nombre + ", realizó su pago. Envíe la captura al 944 870 211.");
            } else {
                alert("¡Pago con tarjeta procesado con éxito!");
            }

            // LIMPIEZA TOTAL
            localStorage.removeItem("carrito"); // Borra productos de la memoria
            this.reset(); // Limpia los cuadros de texto
            document.getElementById("monto-total").textContent = "Total a pagar: S/ 0.00"; // Resetea el monto visual
            verificarMetodo(); // Oculta secciones de pago
        });

        window.onload = function() {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const total = carrito.reduce((acc, p) => acc + (p.precio || 0), 0);
            document.getElementById("monto-total").textContent = "Total a pagar: S/ " + total.toFixed(2);
        };
    </script>
</body>
</html>
