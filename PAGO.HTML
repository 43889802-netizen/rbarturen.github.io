<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Azkabar - Finalizar Compra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>💳 Finalizar Pedido</h1>
        <div id="auth-container"></div>
    </header>
    <div class="container">
        <form id="form-pago">
            <h3>Datos de Envío</h3>
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="email" id="correo" placeholder="Correo electrónico" required>
            <input type="number" id="telefono" placeholder="Teléfono de contacto" required>

            <h3>Método de Pago</h3>
            <select id="metodo" required onchange="verificarMetodo()">
                <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                <option value="yape">Yape / Plin</option>
                <option value="efectivo">Pago contra entrega</option>
            </select>

            <div id="contenedor-tarjeta">
                <h4>Datos de la Tarjeta</h4>
                <input type="text" class="input-tarjeta" id="num-tarjeta" placeholder="Número de Tarjeta (16 dígitos)" maxlength="16" required>
                <input type="text" class="input-tarjeta" placeholder="Nombre del Titular" required>
                <div class="fila-tarjeta">
                    <input type="text" class="input-tarjeta" placeholder="MM/AA" maxlength="5" required>
                    <input type="password" class="input-tarjeta" placeholder="CVV" maxlength="3" required>
                </div>
            </div>

            <div id="contenedor-yape" style="display:none;">
                <p>Escanea el código para yapear:</p>
                <img src="imagenes/qr-yape.png" alt="QR Yape Azkabar">
                <span class="numero-yape">O yapea al: <strong>944 870 211</strong></span>
                <p><small>Titular: Azkabar Licores</small></p>
            </div>
            
            <div id="detalle-final">
                <h4 id="monto-total"></h4>
            </div>

            <button type="submit" class="btn-pagar">Confirmar y Pagar</button>
        </form>
    </div>

    <script>

        function verificarMetodo() {
            const metodo = document.getElementById("metodo").value;
            const cajaYape = document.getElementById("contenedor-yape");
            const cajaTarjeta = document.getElementById("contenedor-tarjeta");

            if (metodo === "yape") {
                cajaYape.style.display = "block";
                cajaTarjeta.style.display = "none";
                configurarRequeridos(cajaTarjeta, false);
            } else if (metodo === "tarjeta") {
                cajaYape.style.display = "none";
                cajaTarjeta.style.display = "block";
                configurarRequeridos(cajaTarjeta, true);
            } else {
                cajaYape.style.display = "none";
                cajaTarjeta.style.display = "none";
                configurarRequeridos(cajaTarjeta, false);
            }
        }

        function configurarRequeridos(contenedor, estado) {
            const inputs = contenedor.getElementsByTagName('input');
            for (let i = 0; i < inputs.length; i++) {
                inputs[i].required = estado;
            }
        }

        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const total = carrito.reduce((acc, p) => acc + (parseFloat(p.precio) || 0), 0);
        document.getElementById("monto-total").textContent = "Total a pagar: S/ " + total.toFixed(2);

        document.getElementById("form-pago").addEventListener("submit", function(e) {
            e.preventDefault();
            const metodoSeleccionado = document.getElementById("metodo").value;
            
            if (metodoSeleccionado === "yape") {
                alert("✅ ¡Pedido registrado! Por favor, envía la captura de tu Yape al WhatsApp de AZKABAR para procesar tu entrega.");
            } else {
                alert("✅ ¡Pago procesado con éxito! Gracias por tu compra en AZKABAR.");
            }
            
            localStorage.removeItem("carrito");
            window.location.href = "index.html";
        });
    </script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
